<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Goodvalley · Ciruelas{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
</head>
<body>
<header class="topbar">
  <a class="brand" href="{{ url_for('index') }}">
    <div class="brand-logo-wrap">
      <img src="{{ url_for('static', filename='logo.png') }}" alt="Goodvalley" class="brand-logo">
    </div>
  </a>
  <nav>
    <a href="{{ url_for('index') }}"
       class="{{ 'on' if request.endpoint == 'index' else '' }}">Resumen</a>
    <a href="{{ url_for('list_bins') }}"
       class="{{ 'on' if request.endpoint and 'bin' in request.endpoint else '' }}">Inventario de Bins</a>
    <a href="{{ url_for('list_orders') }}"
       class="{{ 'on' if request.endpoint and 'order' in request.endpoint else '' }}">Órdenes de Venta</a>
  </nav>
  <div class="topbar-actions">
    <a class="btn btn-pw" href="http://localhost:8899" target="_blank" id="sync-pw-btn"
       title="Importar desde pWarehouse8 (requiere estar en la red local)">
      Sync pWarehouse
    </a>
    <form action="{{ url_for('sync_upload') }}" method="post"
          enctype="multipart/form-data" class="sync-form">
      <label class="btn btn-sync" title="Subir bins.json manualmente">
        Subir JSON
        <input type="file" name="bins_file" accept=".json" style="display:none"
               onchange="this.form.submit()">
      </label>
    </form>
  </div>
</header>
<script>
  // Grey out the pWarehouse button if the local server is not running
  fetch('http://localhost:8899/ping', {mode:'no-cors'}).catch(() => {
    const b = document.getElementById('sync-pw-btn');
    if (b) { b.style.opacity = '0.4'; b.title = 'Servidor local no activo — abrí sync_server.py en tu Mac'; }
  });
</script>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
    <div class="flash {{ cat }}">{{ msg }}</div>
  {% endfor %}
{% endwith %}

<main>{% block content %}{% endblock %}</main>
<footer class="foot">Goodvalley · Plataforma de Gestión de Inventario</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
