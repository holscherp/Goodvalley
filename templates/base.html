<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Goodvalley{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('list_orders') }}">
      <img src="{{ url_for('static', filename='logo.png') }}"
           alt="Goodvalley"
           onerror="this.replaceWith(document.createTextNode('Goodvalley'))">
    </a>
    <div class="navbar-nav ms-4">
      <a class="nav-link {% if request.endpoint and 'order' in request.endpoint %}active{% endif %}"
         href="{{ url_for('list_orders') }}">
        <i class="bi bi-receipt me-1"></i>Sales Orders
      </a>
      <a class="nav-link {% if request.endpoint and 'bin' in request.endpoint %}active{% endif %}"
         href="{{ url_for('list_bins') }}">
        <i class="bi bi-archive me-1"></i>Bin Inventory
      </a>
    </div>
  </div>
</nav>

<div class="container mt-4 mb-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
