<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Goodvalley · Ciruelas{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
</head>
<body>
<header class="topbar">
  <a class="brand" href="{{ url_for('index') }}">
    <div class="brand-logo-wrap">
      <img src="{{ url_for('static', filename='logo.png') }}" alt="Goodvalley" class="brand-logo">
    </div>
  </a>
  <nav>
    <a href="{{ url_for('index') }}"
       class="{{ 'on' if request.endpoint == 'index' else '' }}">Resumen</a>
    <a href="{{ url_for('list_bins') }}"
       class="{{ 'on' if request.endpoint and 'bin' in request.endpoint else '' }}">Inventario de Bins</a>
    <a href="{{ url_for('list_orders') }}"
       class="{{ 'on' if request.endpoint and 'order' in request.endpoint else '' }}">Órdenes de Venta</a>
  </nav>
  <div class="topbar-actions">
    <button class="btn btn-pw" id="sync-pw-btn"
            onclick="gvSyncPopup()"
            title="Importar todos los bins desde pWarehouse8">
      Sync pWarehouse
    </button>
    <form action="{{ url_for('sync_upload') }}" method="post"
          enctype="multipart/form-data" class="sync-form">
      <label class="btn btn-sync" title="Subir bins.json manualmente">
        Subir JSON
        <input type="file" name="bins_file" accept=".json" style="display:none"
               onchange="this.form.submit()">
      </label>
    </form>
  </div>
</header>
<script>
function gvSyncPopup() {
  const w = 580, h = 420;
  const left = Math.round(screen.width  / 2 - w / 2);
  const top  = Math.round(screen.height / 2 - h / 2);
  window.open(
    'http://localhost:8899/sync-popup',
    'gv_sync',
    `width=${w},height=${h},left=${left},top=${top},toolbar=no,location=no,menubar=no,status=no`
  );
}
// When the popup finishes, it sends this message — reload to show fresh counts
window.addEventListener('message', function(e) {
  if (e.data === 'gv_sync_done') location.reload();
});
</script>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
    <div class="flash {{ cat }}">{{ msg }}</div>
  {% endfor %}
{% endwith %}

<main>{% block content %}{% endblock %}</main>
<footer class="foot">Goodvalley · Plataforma de Gestión de Inventario</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
