{% extends 'base.html' %}
{% block title %}New Order — Goodvalley{% endblock %}

{% block content %}
<div class="mb-4">
  <a href="{{ url_for('list_orders') }}" class="text-muted text-decoration-none">
    <i class="bi bi-arrow-left me-1"></i>Back to Orders
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card shadow-sm">
      <div class="card-header bg-white fw-semibold">
        <i class="bi bi-receipt me-2"></i>New Sales Order
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Buyer Name / Company <span class="text-danger">*</span></label>
            <input type="text" name="buyer_name" class="form-control"
                   value="{{ request.form.get('buyer_name', '') }}"
                   placeholder="e.g. Acme Foods Ltd." required>
          </div>

          <hr class="my-3">
          <p class="text-muted small mb-3">
            Order requirements (used to pre-fill the bin search — can be changed later).
          </p>

          <div class="row">
            <div class="col-6">
              <label class="form-label fw-semibold">Caliber From</label>
              <select name="req_caliber_low" class="form-select">
                <option value="">Any</option>
                {% for lo, hi in CALIBER_OPTIONS %}
                  <option value="{{ lo }}"
                    {% if request.form.get('req_caliber_low') == lo|string %}selected{% endif %}>
                    {{ lo }}/{{ hi }}
                  </option>
                {% endfor %}
              </select>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">Caliber To</label>
              <select name="req_caliber_high" class="form-select">
                <option value="">Any</option>
                {% for lo, hi in CALIBER_OPTIONS %}
                  <option value="{{ hi }}"
                    {% if request.form.get('req_caliber_high') == hi|string %}selected{% endif %}>
                    {{ lo }}/{{ hi }}
                  </option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="mb-3 mt-3">
            <label class="form-label fw-semibold">Drying Method</label>
            <select name="req_drying_method" class="form-select">
              <option value="">Any</option>
              {% for key, label in DRYING_METHODS.items() %}
                <option value="{{ key }}"
                  {% if request.form.get('req_drying_method') == key %}selected{% endif %}>
                  {{ label }}
                </option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Notes</label>
            <textarea name="notes" class="form-control" rows="3"
                      placeholder="Optional">{{ request.form.get('notes', '') }}</textarea>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">
              Create Order
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
